services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: clutchzone
      POSTGRES_USER: clutchzone
      POSTGRES_PASSWORD: local_development_only
    ports:
      - "5432:5432"
    volumes:
      - clutchzone_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clutchzone -d clutchzone"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  clutchzone_postgres:
