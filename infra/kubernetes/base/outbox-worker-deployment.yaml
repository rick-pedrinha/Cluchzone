apiVersion: apps/v1
kind: Deployment
metadata:
  name: clutchzone-outbox-worker
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: clutchzone-outbox-worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: clutchzone-outbox-worker
    spec:
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: worker
          image: ghcr.io/clutchzone/backend:replace-with-immutable-tag
          imagePullPolicy: IfNotPresent
          command: ["npm", "run", "worker:outbox:start"]
          envFrom:
            - configMapRef:
                name: clutchzone-backend-config
            - secretRef:
                name: clutchzone-backend-secrets
          env:
            - name: OUTBOX_WORKER_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 384Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
