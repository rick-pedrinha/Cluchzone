apiVersion: batch/v1
kind: Job
metadata:
  name: clutchzone-backend-migrate
spec:
  backoffLimit: 2
  ttlSecondsAfterFinished: 86400
  template:
    spec:
      restartPolicy: Never
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: migrate
          image: ghcr.io/clutchzone/backend:replace-with-immutable-tag
          imagePullPolicy: IfNotPresent
          command: ["npm", "run", "migrate:deploy"]
          envFrom:
            - secretRef:
                name: clutchzone-backend-secrets
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
