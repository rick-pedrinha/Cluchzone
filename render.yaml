databases:
  - name: clutchzone-postgres
    plan: free
    databaseName: clutchzone
    user: clutchzone

services:
  - type: web
    name: clutchzone-backend
    plan: free
    runtime: node
    rootDir: backend
    buildCommand: npm ci --include=dev && npm run build
    startCommand: npm run migrate:deploy && npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: clutchzone-postgres
          property: connectionString
      - key: SESSION_SECRET
        generateValue: true
      - key: STEAM_API_KEY
        sync: false
      - key: CS2_SECRET_KEY
        sync: false
      - key: FRONTEND_URL
        value: https://clutchzone-backend-1p2m.onrender.com
      - key: BACKEND_URL
        value: https://clutchzone-backend-1p2m.onrender.com
      - key: CORS_ORIGINS
        value: https://clutchzone-backend-1p2m.onrender.com,https://rick-pedrinha.github.io
      - key: TRUST_PROXY
        value: true
