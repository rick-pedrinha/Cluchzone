databases:
  - name: clutchzone-postgres
    databaseName: clutchzone
    user: clutchzone

services:
  - type: web
    name: clutchzone-backend
    runtime: node
    rootDir: backend
    buildCommand: npm ci && npm run build
    startCommand: npm run migrate:deploy && npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: clutchzone-postgres
          property: connectionString
      - key: SESSION_SECRET
        generateValue: true
      - key: STEAM_API_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: BACKEND_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: TRUST_PROXY
        value: true
