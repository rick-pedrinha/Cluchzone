name: Publicar CLUTCHZONE no GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Baixar código atualizado
        uses: actions/checkout@v4

      - name: Preparar versão pública
        run: |
          mkdir -p site
          find . -maxdepth 1 -type f \( -name '*.html' -o -name '*.css' -o -name '*.js' \) -exec cp {} site/ \;
          cp -R images site/images
          VERSION="${GITHUB_SHA::12}"
          find site -name '*.html' -exec sed -i -E "s#((src|href)=\"[^\"]+\.(js|css))(\?v=[^\"]*)?\"#\1?v=${VERSION}\"#g" {} +
          touch site/.nojekyll

      - name: Empacotar site para o Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Publicar no GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
